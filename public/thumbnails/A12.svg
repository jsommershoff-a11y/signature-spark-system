<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Voice-Assistent Empfang">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A12</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(140,90)">
      <!-- waves -->
      <g fill="none" stroke="#F97316" stroke-width="3" stroke-linecap="round">
        <path d="M30 220 q40 -120 100 -120 t 100 120" opacity="0.25"/>
        <path d="M60 220 q30 -90 80 -90 t 80 90" opacity="0.45"/>
        <path d="M90 220 q20 -60 60 -60 t 60 60" opacity="0.7"/>
      </g>
      <!-- headset / orb -->
      <circle cx="150" cy="200" r="56" fill="#0F3E2E"/>
      <circle cx="150" cy="200" r="36" fill="#F97316"/>
      <rect x="142" y="184" width="16" height="32" rx="8" fill="#FFFFFF"/>
      <path d="M132 200 q18 28 36 0" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="translate(440,140)">
      <text font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0F3E2E">Anrufer-Klassifizierung</text>
      <g transform="translate(0,30)">
        <rect x="0" y="0" rx="10" ry="10" width="280" height="32" fill="#FFFFFF" stroke="#0F3E2E" stroke-width="2"/>
        <circle cx="18" cy="16" r="6" fill="#F97316"/>
        <text x="34" y="20" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1F2937">Neukunden-Anfrage → MA</text>
      </g><g transform="translate(0,70)">
        <rect x="0" y="0" rx="10" ry="10" width="280" height="32" fill="#FFFFFF" stroke="#6B7280" stroke-width="1"/>
        <circle cx="18" cy="16" r="6" fill="#10B981"/>
        <text x="34" y="20" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1F2937">Termin → Kalender</text>
      </g><g transform="translate(0,110)">
        <rect x="0" y="0" rx="10" ry="10" width="280" height="32" fill="#FFFFFF" stroke="#6B7280" stroke-width="1"/>
        <circle cx="18" cy="16" r="6" fill="#94A3B8"/>
        <text x="34" y="20" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1F2937">Standardfrage → KI</text>
      </g><g transform="translate(0,150)">
        <rect x="0" y="0" rx="10" ry="10" width="280" height="32" fill="#FFFFFF" stroke="#6B7280" stroke-width="1"/>
        <circle cx="18" cy="16" r="6" fill="#FBBF24"/>
        <text x="34" y="20" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1F2937">Reklamation → Lead</text>
      </g>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Voice-Assistent Empfang</text>
  </g>
</svg>