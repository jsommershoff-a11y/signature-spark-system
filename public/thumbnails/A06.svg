<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Dokumenten-Extraktion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A06</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(60,90)">
      <!-- Stack -->
      <rect x="20" y="40" rx="6" ry="6" width="220" height="240" fill="#FFFFFF" stroke="#6B7280" stroke-width="1" opacity="0.5"/>
      <rect x="10" y="20" rx="6" ry="6" width="220" height="240" fill="#FFFFFF" stroke="#6B7280" stroke-width="1" opacity="0.7"/>
      <rect x="0" y="0" rx="8" ry="8" width="220" height="240" fill="#FFFFFF" stroke="#0F3E2E" stroke-width="2"/>
      <text x="16" y="30" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#1F2937">RECHNUNG</text>
      <rect x="16" y="50" width="180" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="68" width="150" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="86" width="120" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="104" width="180" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="122" width="150" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="140" width="120" height="6" rx="2" fill="#1F2937" opacity="0.4"/><rect x="16" y="158" width="180" height="6" rx="2" fill="#1F2937" opacity="0.4"/>
      <!-- scan beam -->
      <rect x="-8" y="140" width="240" height="3" fill="#F97316"/>
      <rect x="-8" y="138" width="240" height="20" fill="#F97316" opacity="0.15"/>
    </g>
    <!-- arrow -->
    <g transform="translate(310,210)">
      <path d="M0 0 L40 0 L40 -10 L60 5 L40 20 L40 10 L0 10 Z" fill="#F97316"/>
    </g>
    <!-- Structured -->
    <g transform="translate(400,110)">
      <rect x="0" y="0" rx="14" ry="14" width="320" height="220" fill="#0F3E2E"/>
      <text x="20" y="32" font-family="ui-monospace, monospace" font-size="11" fill="#FDBA74">{ extracted }</text>
      <g transform="translate(20,50)">
        <text font-family="ui-monospace, monospace" font-size="11" fill="#FFFFFF" opacity="0.6">invoice:</text>
        <text x="100" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#FDBA74">#2087-A</text>
      </g><g transform="translate(20,82)">
        <text font-family="ui-monospace, monospace" font-size="11" fill="#FFFFFF" opacity="0.6">amount:</text>
        <text x="100" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#FDBA74">1.247,00 €</text>
      </g><g transform="translate(20,114)">
        <text font-family="ui-monospace, monospace" font-size="11" fill="#FFFFFF" opacity="0.6">vat:</text>
        <text x="100" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#FDBA74">19%</text>
      </g><g transform="translate(20,146)">
        <text font-family="ui-monospace, monospace" font-size="11" fill="#FFFFFF" opacity="0.6">date:</text>
        <text x="100" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#FDBA74">2025-11-21</text>
      </g><g transform="translate(20,178)">
        <text font-family="ui-monospace, monospace" font-size="11" fill="#FFFFFF" opacity="0.6">vendor:</text>
        <text x="100" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#FDBA74">Müller GmbH</text>
      </g>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Dokumenten-Extraktion</text>
  </g>
</svg>