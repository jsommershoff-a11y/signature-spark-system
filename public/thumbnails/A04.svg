<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Angebots-Generator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A04</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(140,90)">
      <!-- back doc -->
      <rect x="40" y="20" rx="8" ry="8" width="280" height="280" fill="#FFFFFF" stroke="#6B7280" stroke-width="1" opacity="0.6"/>
      <!-- main doc -->
      <rect x="0" y="0" rx="10" ry="10" width="280" height="280" fill="#FFFFFF" stroke="#0F3E2E" stroke-width="2"/>
      <rect x="0" y="0" rx="10" ry="10" width="280" height="50" fill="#0F3E2E"/>
      <text x="20" y="32" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">ANGEBOT #2025-0142</text>
      <rect x="20" y="72" width="200" height="8" rx="3" fill="#1F2937" opacity="0.8"/><rect x="20" y="94" width="170" height="8" rx="3" fill="#1F2937" opacity="0.7"/><rect x="20" y="116" width="140" height="8" rx="3" fill="#1F2937" opacity="0.6"/><rect x="20" y="138" width="200" height="8" rx="3" fill="#1F2937" opacity="0.5"/><rect x="20" y="160" width="170" height="8" rx="3" fill="#1F2937" opacity="0.4"/>
      <rect x="20" y="200" width="240" height="56" rx="8" fill="#FFF3EB"/>
      <text x="32" y="222" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#6B7280">Investition</text>
      <text x="32" y="245" font-family="Inter,sans-serif" font-size="20" font-weight="800" fill="#F97316">Auf Anfrage</text>
    </g>
    <g transform="translate(490,140)">
      <circle cx="60" cy="60" r="50" fill="#F97316"/>
      <path d="M60 30 L66 54 L90 60 L66 66 L60 90 L54 66 L30 60 L54 54 Z" fill="#FFFFFF"/>
      <text x="60" y="140" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0F3E2E" text-anchor="middle">in 5 Minuten</text>
      <text x="60" y="158" font-family="Inter,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">statt 2 Stunden</text>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Angebots-Generator</text>
