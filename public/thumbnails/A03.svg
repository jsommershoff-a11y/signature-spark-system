<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Lead-Qualifizierer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A03</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(70,110)">
      <!-- Funnel -->
      <polygon points="0,20 280,20 240,90 40,90" fill="#F97316" opacity="0.9"/>
      <polygon points="40,100 240,100 200,170 80,170" fill="#F97316" opacity="0.7"/>
      <polygon points="80,180 200,180 170,240 110,240" fill="#F97316" opacity="0.5"/>
      <text x="140" y="60" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Anfragen 1.250</text>
      <text x="140" y="140" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Qualifiziert 320</text>
      <text x="140" y="215" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Hot 47</text>
    </g>
    <g transform="translate(450,130)">
      <!-- Score gauge -->
      <circle cx="100" cy="100" r="80" fill="none" stroke="#0F3E2E" stroke-width="14" opacity="0.15"/>
      <path d="M 28 130 A 80 80 0 1 1 172 130" fill="none" stroke="#F97316" stroke-width="14" stroke-linecap="round"/>
      <text x="100" y="95" font-family="Inter,sans-serif" font-size="36" font-weight="800" fill="#0F3E2E" text-anchor="middle">87</text>
      <text x="100" y="120" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">ICP-SCORE</text>
      <text x="100" y="180" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#F97316" text-anchor="middle">→ Vertrieb</text>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Lead-Qualifizierer</text>
  </g>
</svg>