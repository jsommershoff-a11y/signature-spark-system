<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Terminbot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A01</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(70,110)">
      <!-- Calendar -->
      <rect x="0" y="0" rx="16" ry="16" width="320" height="220" fill="#FFFFFF" stroke="#0F3E2E" stroke-width="2"/>
      <rect x="0" y="0" rx="16" ry="16" width="320" height="46" fill="#0F3E2E"/>
      <text x="20" y="30" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">November 2025</text>
      <circle cx="290" cy="23" r="6" fill="#F97316"/>
      <!-- grid -->
      <rect x="20" y="70" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="76" y="70" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="132" y="70" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="188" y="70" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="244" y="70" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="20" y="114" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="76" y="114" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="132" y="114" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="188" y="114" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="244" y="114" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="20" y="158" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="76" y="158" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="132" y="158" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="188" y="158" width="48" height="36" rx="6" fill="#FFF3EB"/><rect x="244" y="158" width="48" height="36" rx="6" fill="#FFF3EB"/>
      <!-- booked -->
      <rect x="20" y="70" width="48" height="36" rx="6" fill="#F97316"/>
      <text x="44" y="93" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">10:00</text>
      <rect x="132" y="114" width="48" height="36" rx="6" fill="#F97316"/>
      <text x="156" y="137" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">14:30</text>
      <rect x="244" y="158" width="48" height="36" rx="6" fill="#0F3E2E"/>
      <text x="268" y="181" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">09:15</text>
    </g>
    <!-- Phone with waves -->
    <g transform="translate(490,120)">
      <rect x="0" y="0" rx="22" ry="22" width="140" height="200" fill="#0F3E2E"/>
      <rect x="10" y="14" rx="10" ry="10" width="120" height="172" fill="#FFFFFF"/>
      <circle cx="70" cy="100" r="38" fill="#F97316"/>
      <path d="M58 92 q12 -10 24 0 q-12 22 -24 0 z" fill="#FFFFFF"/>
      <text x="70" y="160" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0F3E2E" text-anchor="middle">KI-Voice</text>
      <!-- waves -->
      <g stroke="#F97316" stroke-width="2.5" fill="none" opacity="0.7">
        <path d="M150 70 q20 30 0 60"/>
        <path d="M165 60 q30 40 0 80" opacity="0.5"/>
        <path d="M180 50 q40 50 0 100" opacity="0.3"/>
      </g>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Terminbot</text>
  </g>
</svg>