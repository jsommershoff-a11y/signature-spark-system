<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="KI-Profi · Kickoff">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0F3E2E" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Code badge -->
  <g transform="translate(28,28)">
    <rect x="0" y="0" rx="14" ry="14" width="78" height="32" fill="#0F3E2E"/>
    <text x="39" y="21" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">EDU01</text>
  </g>
  <!-- Brand mark -->
  <g transform="translate(772,36)" text-anchor="end">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0F3E2E" opacity="0.55" letter-spacing="2">KI-AUTOMATIONEN</text>
  </g>
  <!-- Scene -->
  
    <g transform="translate(120,100)">
      <!-- rocket -->
      <g transform="translate(40,40)">
        <path d="M80 0 L120 80 L100 80 L100 160 L60 160 L60 80 L40 80 Z" fill="#F97316"/>
        <circle cx="80" cy="60" r="14" fill="#FFFFFF"/>
        <circle cx="80" cy="60" r="6" fill="#0F3E2E"/>
        <path d="M40 80 L20 120 L60 110 Z" fill="#0F3E2E"/>
        <path d="M120 80 L140 120 L100 110 Z" fill="#0F3E2E"/>
        <!-- flames -->
        <path d="M65 160 Q70 200 80 175 Q90 200 95 160 Z" fill="#F97316" opacity="0.8"/>
      </g>
    </g>
    <g transform="translate(400,130)">
      <text font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#0F3E2E">6-Monats-</text>
      <text y="30" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#F97316">Intensivprogramm</text>
      <text y="70" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#1F2937">Kickoff · Onboarding · Tool-Stack</text>
      <g transform="translate(0,90)">
        <circle cx="8" cy="6" r="5" fill="#F97316"/>
        <text x="22" y="11" font-family="Inter,sans-serif" font-size="12" fill="#1F2937">Persönlicher Lernpfad</text>
      </g><g transform="translate(0,112)">
        <circle cx="8" cy="6" r="5" fill="#F97316"/>
        <text x="22" y="11" font-family="Inter,sans-serif" font-size="12" fill="#1F2937">1:1 Kickoff (90 Min)</text>
      </g><g transform="translate(0,134)">
        <circle cx="8" cy="6" r="5" fill="#F97316"/>
        <text x="22" y="11" font-family="Inter,sans-serif" font-size="12" fill="#1F2937">Eigene KI-Strategie</text>
      </g>
    </g>
    
  <!-- Title strip -->
  <g transform="translate(28,392)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1F2937">KI-Profi · Kickoff</text>
  </g>
</svg>